<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🏎️ F1 Ultimate Run</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden; background:#000; touch-action:none;
      -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; font-family:system-ui; color:#fff;
    }
    canvas { display:block; width:100%; height:100%; }
    
    #ui {
      position:absolute; top:env(safe-area-inset-top, 24px); left:0; right:0; text-align:center;
      pointer-events:none; z-index:10; text-shadow:0 2px 4px rgba(0,0,0,0.9);
    }
    #ui > * { pointer-events:auto; }
    h1 { font-size:16px; font-weight:900; font-style:italic; margin-bottom:2px; color:#ff3333; letter-spacing:1px; }
    
    #scoreBoard {
      background: rgba(0,0,0,0.65); padding: 3px 7px; border-radius: 8px;
      display: inline-flex; gap: 3px; align-items: center; border: 1px solid #333; margin-bottom: 3px; font-size: 10px; flex-wrap: wrap; justify-content: center;
    }
    .badge {
      display:none; padding:2px 4px; border-radius:4px; font-size:7px; font-weight:bold; margin-left:2px;
      animation: pulse 1s infinite alternate;
    }
    #nightBadge { background:#0a0a2a; color:#66ccff; border:1px solid #66ccff; }
    #narrowBadge { background:#2a1a0a; color:#ffaa00; border:1px solid #ffaa00; }
    #iceBadge { background:#0a1a2a; color:#00ffff; border:1px solid #00ffff; }
    #scenarioBadge { background:#2a0a2a; color:#ff66cc; border:1px solid #ff66cc; }
    @keyframes pulse { from { opacity:0.8; } to { opacity:1; box-shadow:0 0 5px currentColor; } }

    .btn {
      padding: 8px 16px; font-size: 12px; font-weight: bold; background: linear-gradient(to bottom, #ff3333, #cc0000); 
      border: 2px solid #fff; border-radius: 12px; color: #fff; cursor: pointer; margin-top:3px;
      text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 3px 8px rgba(0,0,0,0.5);
    }
    .btn:active { transform: scale(0.96); }
    .hidden { display:none !important; }
    
    .panel {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(6,6,10,0.95); border:1px solid #333; border-radius:12px;
      padding:14px; width:78%; max-width:260px; text-align:center; z-index:20; box-shadow:0 8px 20px rgba(0,0,0,0.8);
    }
    .panel h2 { margin-bottom:5px; color:#ff3333; font-size:15px; }

    #warningPanel {
      position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
      background:rgba(255, 50, 0, 0.9); border:3px solid #fff; border-radius:15px;
      padding:12px 20px; text-align:center; z-index:15; box-shadow:0 0 20px #ff0000;
      animation: shake 0.4s infinite; display:none;
    }
    #warningPanel h2 { color:#fff; font-size:18px; margin:0; text-transform:uppercase; }
    #warningPanel p { color:#fff; font-size:12px; margin-top:4px; font-weight:bold; }
    @keyframes shake {
      0% { transform:translate(-50%,-50%) rotate(0deg); }
      25% { transform:translate(-52%,-50%) rotate(-3deg); }
      75% { transform:translate(-48%,-50%) rotate(3deg); }
      100% { transform:translate(-50%,-50%) rotate(0deg); }
    }

    /* Indicador de Escudo */
    #powerups {
      position:absolute; top:env(safe-area-inset-top, 70px); right:10px;
      display:flex; flex-direction:column; gap:8px; pointer-events:none;
    }
    .pu-icon {
      width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:16px; background:rgba(0,0,0,0.7); border:2px solid #555; opacity:0.3; transition:0.2s;
    }
    .pu-icon.active { opacity:1; border-color:#00ccff; box-shadow:0 0 8px #00ccff; transform:scale(1.1); }
    #shieldIcon { color:#00ccff; }
  </style>
</head>
<body>
  <div id="ui">
    <h1 id="title">F1 ULTIMATE RUN</h1>
    <div id="scoreBoard">
      <span id="score">0 m</span> |
      <span id="lastScore" style="color:#aaa;">Últ: 0m</span> |
      <span id="highScore" style="color:#ffd700;">🏆 0m</span>
      <span id="scenarioBadge" class="badge">🌍 BASE</span>
      <span id="nightBadge" class="badge">🌙 NOCHE</span>
      <span id="narrowBadge" class="badge">🚧 ESTRECHO</span>
      <span id="iceBadge" class="badge">🧊 HIELO</span>
    </div>
    <br>
    <button id="startBtn" class="btn">🏁 ARRANCAR</button>
    <p style="font-size:10px; opacity:0.5; margin-top:2px;">👆 Arrastra para moverte</p>
    
    <div id="gameOverPanel" class="panel hidden">
      <h2>💥 CRASH!</h2>
      <p id="finalScore" style="font-size:14px; margin-bottom:6px;">Distancia: 0m</p>
      <button id="restartBtn" class="btn">🔄 REINICIAR</button>
    </div>
  </div>

  <div id="powerups">
    <div id="shieldIcon" class="pu-icon">🛡️</div>
  </div>

  <div id="warningPanel">
    <h2>⚠️ ATENCIÓN ⚠️</h2>
    <p>¡CARRETERA ESTRECHA!</p>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const lerp = (a, b, t) => a + (b - a) * t;
    const scenarios = ['base', 'desert', 'mountain', 'night'];
    
    // 🔹 AUDIO
    const audio = {
      ctx: null, engine: { osc: null, gain: null, filter: null, active: false },
      music: { playing: false, nextTime: 0, beat: 0, timer: null },
      init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
      },
      startEngine() {
        if (this.engine.active) return;
        this.engine.osc = this.ctx.createOscillator();
        this.engine.gain = this.ctx.createGain();
        this.engine.filter = this.ctx.createBiquadFilter();
        this.engine.osc.type = 'triangle';
        this.engine.filter.type = 'lowpass'; this.engine.filter.Q.value = 0.7;
        this.engine.osc.connect(this.engine.filter); this.engine.filter.connect(this.engine.gain); this.engine.gain.connect(this.ctx.destination);
        this.engine.osc.frequency.value = 50; this.engine.filter.frequency.value = 220;
        this.engine.gain.gain.value = 0; this.engine.osc.start(); this.engine.active = true;
      },
      updateEngine(speed) {
        if (!this.engine.active) return;
        const t = this.ctx.currentTime;
        this.engine.osc.frequency.setTargetAtTime(40 + speed * 7, t, 0.12);
        this.engine.gain.gain.setTargetAtTime(0.012 + speed * 0.006, t, 0.12);
        this.engine.filter.frequency.setTargetAtTime(130 + speed * 30, t, 0.12);
      },
      stopEngine() { if (this.engine.osc) { try { this.engine.osc.stop(); } catch(e){} this.engine.osc = null; } this.engine.active = false; },
      startMusic() {
        if (this.music.playing) return;
        this.music.playing = true; this.music.nextTime = this.ctx.currentTime + 0.05; this.music.beat = 0;
        this._schedule();
      },
      stopMusic() { this.music.playing = false; if (this.music.timer) clearTimeout(this.music.timer); },
      _schedule() {
        if (!this.music.playing || !this.ctx) return;
        const bpm = 110, sec = 60 / bpm;
        while (this.music.nextTime < this.ctx.currentTime + 0.15) {
          this._playBeat(this.music.nextTime, this.music.beat);
          this.music.nextTime += sec; this.music.beat = (this.music.beat + 1) % 16;
        }
        this.music.timer = setTimeout(() => this._schedule(), 25);
      },
      _playBeat(time, b) {
        try {
          if (b % 4 === 0) { const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.frequency.setValueAtTime(120,time); o.frequency.exponentialRampToValueAtTime(25,time+0.15); g.gain.setValueAtTime(0.18,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.15); o.start(time); o.stop(time+0.15); }
          if (b % 4 === 2) { const d=this.ctx.createBuffer(1,this.ctx.sampleRate*0.08,this.ctx.sampleRate).getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(this.ctx.sampleRate*0.03)); const n=this.ctx.createBufferSource(); n.buffer=d; const g=this.ctx.createGain(); n.connect(g); g.connect(this.ctx.destination); g.gain.setValueAtTime(0.12,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.08); n.start(time); n.stop(time+0.08); }
          if (b % 2 === 1) { const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='square'; o.connect(g); g.connect(this.ctx.destination); o.frequency.setValueAtTime(8000,time); g.gain.setValueAtTime(0.025,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.02); o.start(time); o.stop(time+0.02); }
          const bass = [55, 55, 65, 55, 73, 73, 55, 65, 55, 55, 82, 73, 55, 65, 55, 49];
          if (b % 2 === 0) { const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='triangle'; o.connect(g); g.connect(this.ctx.destination); o.frequency.setValueAtTime(bass[b/2],time); g.gain.setValueAtTime(0.14,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.25); o.start(time); o.stop(time+0.25); }
        } catch(e){}
      },
      playPass() {
        if(!this.ctx) return; const t=this.ctx.currentTime;
        try {
          const d=this.ctx.createBuffer(1,this.ctx.sampleRate*0.1,this.ctx.sampleRate).getChannelData(0);
          for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(this.ctx.sampleRate*0.02));
          const n=this.ctx.createBufferSource(); n.buffer=d; const g1=this.ctx.createGain(); n.connect(g1); g1.connect(this.ctx.destination);
          g1.gain.setValueAtTime(0.12,t); g1.gain.exponentialRampToValueAtTime(0.001,t+0.1); n.start(t); n.stop(t+0.1);
          const o=this.ctx.createOscillator(), g2=this.ctx.createGain(); o.type='sine'; o.connect(g2); g2.connect(this.ctx.destination);
          o.frequency.setValueAtTime(550,t); o.frequency.exponentialRampToValueAtTime(200,t+0.15); g2.gain.setValueAtTime(0.07,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.15); o.start(t); o.stop(t+0.15);
        } catch(e){}
      },
      playCrash() {
        if(!this.ctx) return; const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); const t=this.ctx.currentTime;
        try { o.type='sawtooth'; o.frequency.setValueAtTime(100,t); o.frequency.exponentialRampToValueAtTime(20,t+0.5); g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); o.start(t); o.stop(t+0.5); } catch(e){}
      },
      playWarningSiren() {
        if(!this.ctx) return; const t=this.ctx.currentTime;
        try {
          const o1=this.ctx.createOscillator(); const g1=this.ctx.createGain();
          o1.type='sawtooth'; o1.connect(g1); g1.connect(this.ctx.destination);
          o1.frequency.setValueAtTime(600, t); o1.frequency.linearRampToValueAtTime(900, t+0.4); o1.frequency.linearRampToValueAtTime(600, t+0.8);
          g1.gain.setValueAtTime(0.15, t); g1.gain.linearRampToValueAtTime(0, t+1); o1.start(t); o1.stop(t+1);
          const o2=this.ctx.createOscillator(); const g2=this.ctx.createGain();
          o2.type='square'; o2.connect(g2); g2.connect(this.ctx.destination);
          o2.frequency.setValueAtTime(1200, t); o2.frequency.linearRampToValueAtTime(1500, t+0.4); o2.frequency.linearRampToValueAtTime(1200, t+0.8);
          g2.gain.setValueAtTime(0.08, t); g2.gain.linearRampToValueAtTime(0, t+1); o2.start(t); o2.stop(t+1);
        } catch(e){}
      },
      playShieldGet() {
        if(!this.ctx) return; const t=this.ctx.currentTime;
        try {
          const o=this.ctx.createOscillator(), g=this.ctx.createGain();
          o.type='sine'; o.connect(g); g.connect(this.ctx.destination);
          o.frequency.setValueAtTime(400,t); o.frequency.linearRampToValueAtTime(800,t+0.15);
          g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
          o.start(t); o.stop(t+0.2);
        } catch(e){}
      },
      playShieldBreak() {
        if(!this.ctx) return; const t=this.ctx.currentTime;
        try {
          const o=this.ctx.createOscillator(), g=this.ctx.createGain();
          o.type='sawtooth'; o.connect(g); g.connect(this.ctx.destination);
          o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(50,t+0.2);
          g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
          o.start(t); o.stop(t+0.2);
        } catch(e){}
      }
    };

    // 🔹 UI & ESTADO
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    const warningPanel = document.getElementById('warningPanel');
    const shieldIcon = document.getElementById('shieldIcon');
    const scenarioBadge = document.getElementById('scenarioBadge');
    
    const els = {
      startBtn: document.getElementById('startBtn'), restartBtn: document.getElementById('restartBtn'),
      score: document.getElementById('score'), lastScore: document.getElementById('lastScore'), highScore: document.getElementById('highScore'),
      nightBadge: document.getElementById('nightBadge'), narrowBadge: document.getElementById('narrowBadge'), iceBadge: document.getElementById('iceBadge'),
      title: document.getElementById('title'), gameOver: document.getElementById('gameOverPanel'), finalScore: document.getElementById('finalScore')
    };

    let state = { 
      running:false, exploding:false, score:0, 
      lastScore: parseInt(localStorage.getItem('f1_last')) || 0,
      highScore: parseInt(localStorage.getItem('f1_highscore')) || 0, 
      baseSpeed: 6.5, speed: 6.5, roadOffset: 0,
      player:{x:0,y:0,w:0,h:0,vx:0,targetX:0,color:'#ff0000'}, 
      obstacles:[], particles:[], powerups:[], snow:[],
      scenario:'base', lastScenarioDist:0,
      nightMode:false, nightStart:0, lastNightDist:0,
      narrowed:false, narrowStart:0, lastNarrowDist:0,
      warningNarrow:false, warningNarrowEnd:0,
      iceMode:false, iceStart:0, lastIceDist:0,
      hasShield:false,
      baseRoadW:0, targetRoadW:0, currentRoadW:0, currentRoadX:0
    };

    els.lastScore.textContent = `Últ: ${state.lastScore}m`;
    els.highScore.textContent = `🏆 ${state.highScore}m`;

    function resize() {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const s = Math.min(canvas.width/400, 1); 
      state.player.w = 36*s; state.player.h = state.player.w*1.65;
      state.player.y = canvas.height - 130;
      state.baseRoadW = Math.min(canvas.width*0.92, 480);
      state.targetRoadW = state.baseRoadW; state.currentRoadW = state.baseRoadW;
      state.currentRoadX = (canvas.width - state.currentRoadW) / 2;
      if(!state.running) {
        state.player.x = state.currentRoadX + state.currentRoadW/2 - state.player.w/2;
        state.player.targetX = state.player.x;
        state.player.vx = 0;
      }
    }
    window.addEventListener('resize', resize); resize();

    let drag=false, dOff=0;
    canvas.addEventListener('touchstart', e=>{ 
      e.preventDefault(); if(!state.running) return; 
      dOff=e.touches[0].clientX-state.player.x; drag=true; 
    }, {passive:false});
    canvas.addEventListener('touchmove', e=>{ 
      e.preventDefault(); if(!state.running||!drag) return; 
      let x=e.touches[0].clientX-dOff; 
      state.player.targetX = Math.max(state.currentRoadX, Math.min(x, state.currentRoadX+state.currentRoadW-state.player.w)); 
    }, {passive:false});
    canvas.addEventListener('touchend', ()=>drag=false); 
    canvas.addEventListener('touchcancel', ()=>drag=false);

    function drawF1(x,y,w,h,col) {
      ctx.save(); ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(x+3,y+4,w,h);
      ctx.fillStyle='#111'; ctx.fillRect(x-4,y+12,5,14); ctx.fillRect(x+w-1,y+12,5,14); ctx.fillRect(x-4,y+h-26,8,22); ctx.fillRect(x+w-4,y+h-26,8,22);
      ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(x+w*0.4,y); ctx.lineTo(x+w*0.6,y); ctx.lineTo(x+w*0.7,y+h*0.25); ctx.lineTo(x+w,y+h*0.35); ctx.lineTo(x+w,y+h*0.75); ctx.lineTo(x+w*0.7,y+h); ctx.lineTo(x+w*0.3,y+h); ctx.lineTo(x,y+h*0.75); ctx.lineTo(x,y+h*0.35); ctx.lineTo(x+w*0.3,y+h*0.25); ctx.fill();
      ctx.fillStyle='#fff'; ctx.fillRect(x+w*0.15,y+h-10,w*0.7,6); ctx.fillRect(x+w*0.15,y+h*0.1,w*0.7,4);
      ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(x+w/2,y+h*0.5,w*0.18,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffff00'; ctx.beginPath(); ctx.arc(x+w/2,y+h*0.45,w*0.1,0,Math.PI*2); ctx.fill(); ctx.restore();
    }

    function drawEnv() {
      const rw=state.currentRoadW, rx=state.currentRoadX;
      let grass='#2d8a35', road='#333', kerb1='#cc0000', kerb2='#ffffff', center='#fff';
      
      if(state.scenario==='desert') { grass='#d4a373'; road='#c2b280'; kerb1='#ffaa00'; kerb2='#222'; center='#ffaa00'; }
      else if(state.scenario==='mountain') { grass='#2c3e50'; road='#34495e'; kerb1='#ecf0f1'; kerb2='#7f8c8d'; center='#ecf0f1'; }
      else if(state.scenario==='night') { grass='#050505'; road='#111'; kerb1='#cc0000'; kerb2='#ffffff'; center='#444'; }
      
      if(state.iceMode) { grass='#0a1520'; road='#6c9ebf'; kerb1='#00ccff'; kerb2='#ffffff'; center='#00ccff'; }

      ctx.fillStyle=grass; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle=road; ctx.fillRect(rx,0,rw,canvas.height);
      
      const kH=22; for(let i=-kH; i<canvas.height+kH; i+=kH) { 
        let y=i+(state.roadOffset%kH); 
        ctx.fillStyle=(Math.floor((y+state.roadOffset)/kH)%2!==0)?kerb1:kerb2; 
        ctx.fillRect(rx-7,y,7,kH); ctx.fillRect(rx+rw,y,7,kH); 
      }
      ctx.strokeStyle=center; ctx.lineWidth=4; ctx.setLineDash([35,35]); ctx.lineDashOffset=-state.roadOffset;
      ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke(); ctx.setLineDash([]);
      
      if(state.narrowed) {
        ctx.strokeStyle='#ffaa00'; ctx.lineWidth=3; ctx.setLineDash([12,8]); ctx.lineDashOffset=-state.roadOffset;
        ctx.beginPath(); ctx.moveTo(rx+5,0); ctx.lineTo(rx+5,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rx+rw-5,0); ctx.lineTo(rx+rw-5,canvas.height); ctx.stroke(); ctx.setLineDash([]);
      }
    }

    function drawNight() {
      if(state.scenario!=='night') return; 
      ctx.save(); ctx.beginPath();
      ctx.rect(0, 0, canvas.width, canvas.height);
      const cx = state.player.x + state.player.w/2;
      const cy = state.player.y + 5;
      const len = 320; const width = state.currentRoadW * 0.85; 
      ctx.moveTo(cx, cy); ctx.lineTo(cx - width/2, cy - len); ctx.lineTo(cx + width/2, cy - len); ctx.closePath();
      ctx.fillStyle = '#000000'; ctx.fill('evenodd'); ctx.restore();
      let glow = ctx.createRadialGradient(cx, cy, 5, cx, cy, 40);
      glow.addColorStop(0, 'rgba(255,255,255,0.6)'); glow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI*2); ctx.fill();
    }

    function drawPowerups() {
      state.powerups.forEach(p => {
        ctx.save();
        ctx.beginPath(); ctx.arc(p.x+p.w/2, p.y+p.h/2, p.w/2+4, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,200,255,0.2)'; ctx.fill(); 
        ctx.strokeStyle = '#00ccff'; ctx.lineWidth=2; ctx.stroke();
        ctx.font = `${p.w*0.7}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle='#fff'; ctx.fillText('🛡️', p.x+p.w/2, p.y+p.h/2);
        ctx.restore();
      });
    }

    function drawSnow() {
      if(!state.iceMode) return;
      ctx.fillStyle='rgba(255,255,255,0.8)';
      state.snow.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
      });
    }

    function drawPlayerEffects() {
      if(state.hasShield) {
        const cx = state.player.x + state.player.w/2;
        const cy = state.player.y + state.player.h/2;
        ctx.strokeStyle='rgba(0,200,255,0.6)'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(cx, cy, state.player.w*0.9, 0, Math.PI*2); ctx.stroke();
      }
    }

    function createExplosion(x,y) { for(let i=0;i<60;i++) state.particles.push({x,y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, life:1, c:Math.random()>0.5?'#ffaa00':'#ff3300', s:Math.random()*4.5+2}); }

    // 🔹 LÓGICA PRINCIPAL
    function update() {
      try {
        state.speed = state.baseSpeed + (state.score / 1200); 
        state.roadOffset += state.speed; 
        audio.updateEngine(state.speed);

        const d = Math.floor(state.score);
        
        // 🌍 Escenarios cada 3000m
        if(d >= state.lastScenarioDist + 3000) {
          let idx = scenarios.indexOf(state.scenario);
          state.scenario = scenarios[(idx + 1) % scenarios.length];
          state.lastScenarioDist = d;
          scenarioBadge.textContent = `🌍 ${state.scenario.toUpperCase()}`;
          scenarioBadge.style.display = 'inline-block';
          els.nightBadge.style.display = state.scenario==='night' ? 'inline-block' : 'none';
        }

        // 🧊 Hielo
        if(!state.iceMode && d>=state.lastIceDist+4000) { state.iceMode=true; state.iceStart=Date.now(); state.lastIceDist=d; els.iceBadge.style.display='inline-block'; }
        if(state.iceMode && Date.now()-state.iceStart>15000) { state.iceMode=false; els.iceBadge.style.display='none'; state.snow=[]; }

        // 🚧 Estrechamiento
        if(!state.warningNarrow && !state.narrowed && d>=state.lastNarrowDist+3000) {
          state.warningNarrow = true; state.warningNarrowEnd = Date.now() + 2000;
          audio.playWarningSiren(); warningPanel.style.display = 'block';
        }
        if(state.warningNarrow && Date.now() >= state.warningNarrowEnd) {
          state.warningNarrow = false; state.narrowed = true; state.narrowStart = Date.now();
          state.targetRoadW = state.baseRoadW * 0.60; els.narrowBadge.style.display = 'inline-block';
          warningPanel.style.display = 'none';
        }
        if(state.narrowed && Date.now()-state.narrowStart>30000) { 
          state.narrowed=false; state.targetRoadW=state.baseRoadW; els.narrowBadge.style.display='none';
          state.lastNarrowDist = d;
        }

        state.currentRoadW = lerp(state.currentRoadW, state.targetRoadW, 0.06);
        state.currentRoadX = (canvas.width - state.currentRoadW)/2;

        // 🧊 Física
        let isIce = state.iceMode;
        let accel = isIce ? 0.035 : 0.18;
        let friction = isIce ? 0.93 : 0.72;
        let dx = state.player.targetX - state.player.x;
        state.player.vx += dx * accel;
        state.player.x += state.player.vx;
        state.player.vx *= friction;
        if(state.player.x < state.currentRoadX) { state.player.x = state.currentRoadX; state.player.vx *= -0.4; }
        if(state.player.x > state.currentRoadX + state.currentRoadW - state.player.w) { state.player.x = state.currentRoadX + state.currentRoadW - state.player.w; state.player.vx *= -0.4; }

        // ❄️ Nieve
        if(state.iceMode && Math.random() < 0.4 && state.snow.length < 60) {
          state.snow.push({ x: Math.random()*canvas.width, y: -5, speed: 2+Math.random()*3, size: 1+Math.random()*2, drift: (Math.random()-0.5)*1 });
        }
        for(let i=state.snow.length-1; i>=0; i--) {
          let s = state.snow[i]; s.y += s.speed; s.x += s.drift + Math.sin(Date.now()/200)*0.5;
          if(s.y > canvas.height) state.snow.splice(i,1);
        }

        // 🛡️ PowerUps (Solo Escudo)
        if(Math.random() < 0.005 && state.powerups.length < 2 && !state.hasShield) {
          let px = state.currentRoadX + 10 + Math.random()*(state.currentRoadW - 40);
          state.powerups.push({ x:px, y:-40, w:30, h:30, type:'shield', speed: state.speed*0.6 });
        }
        for(let i=state.powerups.length-1; i>=0; i--) {
          let p = state.powerups[i]; p.y += state.speed - p.speed;
          let m=5;
          if(state.player.x+m < p.x+p.w-m && state.player.x+state.player.w-m > p.x+m && 
             state.player.y+m < p.y+p.h-m && state.player.y+state.player.h-m > p.y+m) {
            state.hasShield = true; 
            audio.playShieldGet(); 
            shieldIcon.classList.add('active');
            state.powerups.splice(i,1); continue;
          }
          if(p.y > canvas.height+50) state.powerups.splice(i,1);
        }

        // 🚗 Tráfico
        let lastY = state.obstacles.length > 0 ? state.obstacles[state.obstacles.length-1].y : 250;
        let spawnRate = 0.038 + (state.score / 18000); 
        if(state.scenario==='night') spawnRate += 0.025;
        if(state.narrowed) spawnRate *= 0.85;

        if((lastY > 110 || state.obstacles.length === 0) && Math.random() < spawnRate && state.obstacles.length < 5) {
          let count = Math.random() < 0.35 ? (Math.random() < 0.2 ? 3 : 2) : 1;
          if(state.narrowed) count = 1;
          let placedX = [];
          for(let c=0; c<count; c++) {
            let px, attempts=0, valid=false;
            while(!valid && attempts<15) {
              px = state.currentRoadX + 12 + Math.random() * (state.currentRoadW - state.player.w - 24);
              valid = placedX.every(x => Math.abs(px - x) > state.player.w * 0.85); attempts++;
            }
            if(valid) {
              placedX.push(px);
              let isFast = Math.random() < 0.18;
              let speedMultiplier = 1 + Math.floor(d / 200) * 0.15;
              let relSpd = state.speed * (isFast ? 0.12 : 0.5) * speedMultiplier;
              let col = isFast ? '#ff2200' : ['#00d2be','#061954','#ff8000','#ff87bc','#0090ff','#33ff33','#cccccc'][Math.floor(Math.random()*7)];
              state.obstacles.push({ x:px, y:-state.player.h-50-(c*60), w:state.player.w, h:state.player.h, speed:relSpd, c:col, passed:false });
            }
          }
        }

        // Colisión Obstáculos
        for(let i=state.obstacles.length-1; i>=0; i--) {
          let o=state.obstacles[i]; o.y += state.speed - o.speed;
          let p=state.player, m=4;
          if(p.x+m<o.x+o.w-m && p.x+p.w-m>o.x+m && p.y+m<o.y+o.h-m && p.y+p.h-m>o.y+m) {
            if(state.hasShield) {
              state.hasShield=false; shieldIcon.classList.remove('active');
              audio.playShieldBreak(); createExplosion(p.x+p.w/2, p.y+p.h/2);
              state.obstacles.splice(i,1); continue;
            }
            triggerCrash(); return;
          }
          if(state.running && !o.passed && o.y>p.y+p.h) { o.passed=true; state.score+=15; audio.playPass(); }
          if(o.y>canvas.height+100) state.obstacles.splice(i,1);
        }
        if(state.running) { state.score+=0.06; els.score.textContent=`${Math.floor(state.score)} m`; }
      } catch(e) { console.warn(e); }
    }

    function triggerCrash() {
      state.running=false; state.exploding=true; 
      audio.stopMusic(); audio.playCrash();
      if(navigator.vibrate) navigator.vibrate([150,50,120]);
      createExplosion(state.player.x+state.player.w/2, state.player.y+state.player.h/2);
      warningPanel.style.display = 'none';
      setTimeout(gameOver, 1000);
    }

    function gameOver() {
      state.exploding=false; audio.stopEngine();
      let d=Math.floor(state.score); 
      state.lastScore = d; localStorage.setItem('f1_last', d);
      els.lastScore.textContent = `Últ: ${d}m`;
      if(d > state.highScore) { state.highScore=d; localStorage.setItem('f1_highscore',d); els.highScore.textContent=`🏆 ${d}m`; }
      els.finalScore.textContent = `Distancia: ${d} m`;
      els.gameOver.classList.remove('hidden'); els.title.classList.add('hidden');
      warningPanel.style.display = 'none';
      shieldIcon.classList.remove('active');
    }

    function draw() {
      try {
        ctx.clearRect(0,0,canvas.width,canvas.height); 
        drawEnv();
        drawSnow();
        drawPowerups();
        state.obstacles.forEach(o=>drawF1(o.x,o.y,o.w,o.h,o.c));
        if(!state.exploding) { drawF1(state.player.x,state.player.y,state.player.w,state.player.h,state.player.color); drawPlayerEffects(); }
        if(state.particles.length>0) {
          for(let i=state.particles.length-1;i>=0;i--) { let p=state.particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.018; if(p.life<=0) state.particles.splice(i,1); }
          state.particles.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1;
        }
        drawNight();
      } catch(e) { console.warn(e); }
    }

    function loop() { update(); draw(); if(state.running || state.exploding) requestAnimationFrame(loop); }
    function startGame() {
      audio.init(); audio.startEngine(); audio.startMusic();
      state.score=0; state.speed=state.baseSpeed; state.obstacles=[]; state.particles=[]; state.powerups=[]; state.snow=[];
      state.running=true; state.exploding=false; 
      state.scenario='base'; state.lastScenarioDist=0; scenarioBadge.textContent='🌍 BASE'; scenarioBadge.style.display='inline-block';
      els.nightBadge.style.display='none';
      state.narrowed=false; state.lastNarrowDist=0; state.warningNarrow=false; els.narrowBadge.style.display='none';
      state.iceMode=false; state.lastIceDist=0; els.iceBadge.style.display='none';
      state.hasShield=false; shieldIcon.classList.remove('active');
      state.targetRoadW=state.baseRoadW; state.currentRoadW=state.baseRoadW;
      els.score.textContent='0 m';
      els.gameOver.classList.add('hidden'); els.title.classList.remove('hidden'); els.startBtn.classList.add('hidden');
      warningPanel.style.display = 'none';
      resize();
      state.player.x = state.currentRoadX + state.currentRoadW/2 - state.player.w/2;
      state.player.targetX = state.player.x; state.player.vx = 0;
      loop();
    }

    els.startBtn.addEventListener('click', startGame);
    els.restartBtn.addEventListener('click', startGame);
    resize(); draw();
  </script>
</body>
</html>
